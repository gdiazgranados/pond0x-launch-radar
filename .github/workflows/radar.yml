name: radar

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-radar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Clean install watcher deps
        run: npm ci
        working-directory: ./watcher

      - name: Install Playwright browser
        run: npx playwright install chromium
        working-directory: ./watcher

      - name: Run capture
        run: node capture.js
        working-directory: ./watcher

      - name: Run radar
        run: node radar.js
        working-directory: ./watcher

      - name: Copy latest.json to public data
        run: cp watcher/output/latest.json public/data/latest.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/latest.json
          git commit -m "Update radar snapshot" || echo "No changes to commit"
          git push