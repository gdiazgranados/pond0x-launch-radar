name: run-radar

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"   # cada hora

permissions:
  contents: write

jobs:
  run-radar:
    runs-on: ubuntu-latest

    steps:
      # 1. Clonar repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. Instalar dependencias watcher
      - name: Install dependencies
        run: npm install
        working-directory: ./watcher

      # 4. Capturar snapshot
      - name: Run capture
        run: node ./capture.js
        working-directory: ./watcher

      # 5. Ejecutar radar
      - name: Run radar
        run: node ./radar.js
        working-directory: ./watcher

      # 6. Limpiar snapshots viejos (IMPORTANTE 🚨)
      - name: Prune old snapshots
        run: node ./prune-snapshots.js
        working-directory: ./watcher

      # 7. Asegurar carpeta pública
      - name: Ensure public data directory exists
        run: mkdir -p public/data

      # 8. Copiar resultado a frontend
      - name: Copy latest radar output
        run: cp watcher/output/latest.json public/data/latest.json

      # 9. Actualizar histórico
      - name: Update history
        run: node ./watcher/update-history.js

      # 10. Commit automático
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add public/data/latest.json public/data/history.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update radar data"

          # evitar conflicto remoto
          git pull --rebase origin main

          git push origin main