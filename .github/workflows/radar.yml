name: Pond0x Radar

on:
  schedule:
    - cron: "0 * * * *" # cada hora
  workflow_dispatch:

jobs:
  run-radar:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Run capture
        run: node watcher/capture.js

      - name: Run radar
        run: node watcher/radar.js

      - name: Prune old snapshots
        run: node watcher/prune-snapshots.js

      - name: Ensure public data directory exists
        run: mkdir -p public/data

      - name: Copy latest radar output
        run: cp watcher/output/latest.json public/data/latest.json

      - name: Update history
        run: node watcher/update-history.js

      - name: Send alerts
        run: node watcher/notify.js
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}

      - name: Commit and push
        run: |
          git config --global user.name "radar-bot"
          git config --global user.email "bot@radar.ai"
          git add public/data/latest.json public/data/history.json watcher/last-alert.json
          git commit -m "Auto radar update" || echo "No changes to commit"
          git push