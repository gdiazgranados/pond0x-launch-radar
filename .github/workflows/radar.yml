name: Pond0x Launch Radar

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  run-radar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install watcher deps
        working-directory: ./watcher
        run: npm ci

      - name: Run capture
        working-directory: ./watcher
        run: node capture.js

      - name: Run radar
        working-directory: ./watcher
        run: node radar.js

      - name: Copy latest.json
        run: |
          mkdir -p public/data
          cp watcher/output/latest.json public/data/latest.json

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/latest.json
          git diff --cached --quiet || git commit -m "Auto update radar data"
          git push