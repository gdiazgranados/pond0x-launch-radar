name: radar

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-radar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Clean install watcher deps
        working-directory: ./watcher
        run: npm ci

      - name: Install Playwright browser
        working-directory: ./watcher
        run: npx playwright install chromium

      - name: Run capture
        working-directory: ./watcher
        run: node capture.js

      - name: Run radar
        working-directory: ./watcher
        run: node radar.js

      - name: Copy latest.json to public data
        run: cp watcher/output/latest.json public/data/latest.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/latest.json
          git commit -m "Update radar snapshot" || echo "No changes"
          git push