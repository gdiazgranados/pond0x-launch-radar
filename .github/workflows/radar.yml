name: Pond0x Radar

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  run-radar:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root dependencies
        run: npm install

      - name: Install watcher dependencies
        run: |
          cd watcher
          npm install

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Prepare radar-data branch workspace
        run: |
          git fetch origin

          if git ls-remote --exit-code --heads origin radar-data; then
            git checkout radar-data || git checkout -b radar-data origin/radar-data
            git pull origin radar-data
          else
            git checkout -b radar-data
          fi

          mkdir -p public/data
          mkdir -p snapshots
          mkdir -p watcher/output

      - name: Write heartbeat start
        run: |
          node -e '
          const fs = require("fs");
          const path = "public/data/heartbeat.json";
          const now = new Date().toISOString();

          const data = {
            source: "github-actions-sentinel",
            lastRunAt: now,
            lastSuccessAt: null,
            status: "running",
            scheduleMinutes: 5
          };

          fs.mkdirSync("public/data", { recursive: true });
          fs.writeFileSync(path, JSON.stringify(data, null, 2));
          '

      - name: Run watcher pipeline
        run: |
          node watcher/sentinel.js
          node watcher/capture.js
          node watcher/radar.js
          node watcher/discovery.js
          node watcher/notify.js
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Copy watcher output to public data
        run: |
          mkdir -p public/data
          cp watcher/output/sentinel-events.json public/data/sentinel-events.json || true
          cp watcher/output/sentinel-state.json public/data/sentinel-state.json || true
          cp watcher/output/discovery.json public/data/discovery.json || true

      - name: Write heartbeat success
        run: |
          node -e '
          const fs = require("fs");
          const path = "public/data/heartbeat.json";
          const now = new Date().toISOString();

          const data = {
            source: "github-actions-sentinel",
            lastRunAt: now,
            lastSuccessAt: now,
            status: "success",
            scheduleMinutes: 5
          };

          fs.mkdirSync("public/data", { recursive: true });
          fs.writeFileSync(path, JSON.stringify(data, null, 2));
          '

          echo "Heartbeat after success:"
          cat public/data/heartbeat.json

      - name: Commit and push
        run: |
          git config --global user.name "radar-bot"
          git config --global user.email "bot@radar.ai"

          git add public/data/*.json || true
          git add watcher/output/*.json || true
          git add watcher/last-alert.json || true
          git add snapshots || true

          git status --short

          git commit -m "Auto radar update" || echo "No changes to commit"
          git push origin radar-data