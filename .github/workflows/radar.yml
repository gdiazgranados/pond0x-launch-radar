name: Pond0x Radar

on:
  schedule:
    - cron: "0 * * * *" # cada hora
  workflow_dispatch:

jobs:
  run-radar:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root dependencies
        run: npm install

      - name: Install watcher dependencies
        run: |
          cd watcher
          npm install

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Write heartbeat start
        run: |
         node -e "const fs=require('fs'); const path='public/data/heartbeat.json'; const now=new Date().toISOString(); const data={source:'github-actions', lastRunAt:now, lastSuccessAt:null, status:'running', scheduleMinutes:60}; fs.mkdirSync('public/data',{recursive:true}); fs.writeFileSync(path, JSON.stringify(data,null,2));"

      - name: Run capture
        run: node watcher/capture.js

      - name: Run radar
        run: node watcher/radar.js

      - name: Prune old snapshots
        run: node watcher/prune-snapshots.js

      - name: Ensure public data directory exists
        run: mkdir -p public/data

      - name: Update history
        run: node watcher/update-history.js

      - name: Send alerts
        run: node watcher/notify.js
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Write heartbeat success
        run: |
          node -e "const fs=require('fs'); const path='public/data/heartbeat.json'; const now=new Date().toISOString(); const data={source:'github-actions', lastRunAt:now, lastSuccessAt:now, status:'success', scheduleMinutes:60}; fs.writeFileSync(path, JSON.stringify(data,null,2));"
          echo "Heartbeat after success:"
          cat public/data/heartbeat.json
      - name: Commit and push
        run: |
          git config --global user.name "radar-bot"
          git config --global user.email "bot@radar.ai"
          git add public/data/latest.json public/data/history.json public/data/alerts-history.json public/data/heartbeat.json watcher/last-alert.json
          git commit -m "Auto radar update" || echo "No changes to commit"
          git push
