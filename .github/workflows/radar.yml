name: radar

on:
  workflow_dispatch:

jobs:
  run-radar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Clean install watcher deps
        working-directory: ./watcher
        run: |
        rm -rf node_modules package-lock.json
        npm install

      - name: Install Playwright browser
        working-directory: ./watcher
        run: npm exec playwright install chromium

      - name: Run capture
        working-directory: ./watcher
        run: node capture.js

      - name: Run radar
        working-directory: ./watcher
        run: node radar.js

      - name: Copy latest.json to public data
        run: cp watcher/output/latest.json public/data/latest.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/latest.json
          git diff --cached --quiet || git commit -m "Update radar snapshot"
          git push