name: Pond0x Radar

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  run-radar:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root dependencies
        run: npm install

      - name: Install watcher dependencies
        run: |
          cd watcher
          npm install

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Prepare workspace
        run: |
          mkdir -p public/data
          mkdir -p snapshots
          mkdir -p watcher/output
          mkdir -p .publish/data
          mkdir -p .publish/snapshots

      - name: Write heartbeat start
        run: |
          node -e '
          const fs = require("fs");
          const path = "public/data/heartbeat.json";
          const now = new Date().toISOString();

          const data = {
            source: "github-actions-sentinel",
            lastRunAt: now,
            lastSuccessAt: null,
            status: "running",
            scheduleMinutes: 5
          };

          fs.mkdirSync("public/data", { recursive: true });
          fs.writeFileSync(path, JSON.stringify(data, null, 2));
          '

      - name: Run sentinel
        run: node watcher/sentinel.js

      - name: Run capture
        run: node watcher/capture.js

      - name: Debug snapshots after capture
        run: |
          echo "=== snapshots root ==="
          ls -la snapshots || true

          echo ""
          echo "=== newest snapshot dirs ==="
          find snapshots -maxdepth 1 -mindepth 1 -type d | sort || true

      - name: Run radar
        run: node watcher/radar.js

      - name: Run discovery
        run: node watcher/discovery.js

      - name: Run notify
        run: node watcher/notify.js
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Debug timestamps after watcher pipeline
        run: |
          echo "=== Search latest.json references ==="
          find . -name "latest.json" -type f -print

          echo ""
          echo "=== Search heartbeat.json references ==="
          find . -name "heartbeat.json" -type f -print

      - name: Copy watcher output to public data
        run: |
          mkdir -p public/data

          # CORE FILES
          cp watcher/output/latest.json public/data/latest.json || true
          cp watcher/output/history.json public/data/history.json || true
          cp watcher/output/alerts-history.json public/data/alerts-history.json || true

          # SENTINEL / AUX
          cp watcher/output/sentinel-events.json public/data/sentinel-events.json || true
          cp watcher/output/sentinel-state.json public/data/sentinel-state.json || true
          cp watcher/output/discovery.json public/data/discovery.json || true

      - name: Write heartbeat success
        run: |
          node -e '
          const fs = require("fs");
          const path = "public/data/heartbeat.json";
          const now = new Date().toISOString();

          const data = {
            source: "github-actions-sentinel",
            lastRunAt: now,
            lastSuccessAt: now,
            status: "success",
            scheduleMinutes: 5
          };

          fs.mkdirSync("public/data", { recursive: true });
          fs.writeFileSync(path, JSON.stringify(data, null, 2));
          '

          echo "Heartbeat after success:"
          cat public/data/heartbeat.json

      - name: Debug outputs after watcher pipeline
        run: |
          echo "=== watcher/output files ==="
          ls -la watcher/output || true

          echo ""
          echo "=== public/data files ==="
          ls -la public/data || true

          echo ""
          echo "=== watcher/output/latest.json ==="
          cat watcher/output/latest.json || echo "missing watcher/output/latest.json"

          echo ""
          echo "=== public/data/latest.json ==="
          cat public/data/latest.json || echo "missing public/data/latest.json"

      - name: Prepare publish bundle
        run: |
          mkdir -p .publish/data
          mkdir -p .publish/snapshots

          # Source of truth for core published data
          cp public/data/*.json .publish/data/ 2>/dev/null || true

          # Copy only auxiliary watcher outputs that are not already core published files
          cp watcher/output/sentinel-events.json .publish/data/sentinel-events.json 2>/dev/null || true
          cp watcher/output/sentinel-state.json .publish/data/sentinel-state.json 2>/dev/null || true
          cp watcher/output/discovery.json .publish/data/discovery.json 2>/dev/null || true
          cp watcher/last-alert.json .publish/data/last-alert.json 2>/dev/null || true

          if [ -d snapshots ]; then
            rsync -a --delete snapshots/ .publish/snapshots/
          fi

      - name: Publish to radar-data branch
        run: |
          git fetch origin radar-data || true

          rm -rf /tmp/radar-data
          if git ls-remote --exit-code --heads origin radar-data; then
            git worktree add /tmp/radar-data origin/radar-data
          else
            git worktree add -b radar-data /tmp/radar-data
          fi

          mkdir -p /tmp/radar-data/data
          mkdir -p /tmp/radar-data/snapshots

          rsync -a --delete .publish/data/ /tmp/radar-data/data/
          rsync -a --delete .publish/snapshots/ /tmp/radar-data/snapshots/

          cd /tmp/radar-data
          git config user.name "radar-bot"
          git config user.email "bot@radar.ai"

          git add data snapshots
          git status --short

          git commit -m "Auto radar data update" || echo "No changes to commit"
          git push origin HEAD:radar-data