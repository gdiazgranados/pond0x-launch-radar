name: radar

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  run-radar:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: watcher/package-lock.json

      - name: Install watcher deps
        working-directory: ./watcher
        run: npm ci

      - name: Install Playwright browser
        working-directory: ./watcher
        run: npx playwright install --with-deps chromium

      - name: Run capture
        working-directory: ./watcher
        run: node capture.js

      - name: Run radar
        working-directory: ./watcher
        run: node radar.js

      - name: Copy latest.json to public data
        run: |
          mkdir -p public/data
          cp watcher/output/latest.json public/data/latest.json

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/latest.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto update radar data"
            git push
          fi