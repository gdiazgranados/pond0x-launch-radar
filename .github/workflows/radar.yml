name: Pond0x Radar

on:
  schedule:
    - cron: "0 * * * *" # cada 1 hora (ajústalo después si quieres)
  workflow_dispatch:

jobs:
  run-radar:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm install
          cd watcher && npm install

      - name: Install Playwright
        run: npx playwright install chromium

      - name: Prepare workspace
        run: |
          mkdir -p public/data
          mkdir -p snapshots

      # =========================
      # RESTORE STATE
      # =========================
      - name: Restore previous state from radar-data
        run: |
          git fetch origin radar-data || true

          if git ls-remote --exit-code --heads origin radar-data; then
            rm -rf /tmp/radar-restore
            git worktree add /tmp/radar-restore origin/radar-data

            cp -R /tmp/radar-restore/data/. public/data/ 2>/dev/null || true
            cp -R /tmp/radar-restore/snapshots/. snapshots/ 2>/dev/null || true

            git worktree remove /tmp/radar-restore --force || true
            rm -rf /tmp/radar-restore || true
          else
            echo "No previous state"
          fi

      # =========================
      # HEARTBEAT START
      # =========================
      - name: Write heartbeat start
        run: |
          node -e '
          const fs = require("fs");
          const path = "public/data/heartbeat.json";
          const now = new Date().toISOString();

          const data = {
            source: "github-actions",
            lastRunAt: now,
            lastSuccessAt: null,
            status: "running",
            scheduleMinutes: 60
          };

          fs.mkdirSync("public/data", { recursive: true });
          fs.writeFileSync(path, JSON.stringify(data, null, 2));
          '

      # =========================
      # CORE PIPELINE
      # =========================
      - name: Run sentinel
        run: node watcher/sentinel.js

      - name: Run capture
        run: node watcher/capture.js

      - name: Run radar
        run: node watcher/radar.js

      - name: Run discovery
        run: node watcher/discovery.js

      # =========================
      # HEARTBEAT SUCCESS
      # =========================
      - name: Write heartbeat success
        run: |
          node -e '
          const fs = require("fs");
          const path = "public/data/heartbeat.json";
          const now = new Date().toISOString();

          const data = {
            source: "github-actions",
            lastRunAt: now,
            lastSuccessAt: now,
            status: "success",
            scheduleMinutes: 60
          };

          fs.writeFileSync(path, JSON.stringify(data, null, 2));
          '

      # =========================
      # PREPARE PUBLISH
      # =========================
      - name: Prepare publish bundle
        run: |
          mkdir -p .publish/data
          mkdir -p .publish/snapshots

          # SINGLE SOURCE OF TRUTH
          cp public/data/*.json .publish/data/ 2>/dev/null || true

          if [ -d snapshots ]; then
            rsync -a --delete snapshots/ .publish/snapshots/
          fi

      # =========================
      # PUBLISH
      # =========================
      - name: Publish to radar-data branch
        run: |
          git fetch origin radar-data || true

          rm -rf /tmp/radar-data
          if git ls-remote --exit-code --heads origin radar-data; then
            git worktree add /tmp/radar-data origin/radar-data
          else
            git worktree add -b radar-data /tmp/radar-data
          fi

          mkdir -p /tmp/radar-data/data
          mkdir -p /tmp/radar-data/snapshots

          rsync -a --delete .publish/data/ /tmp/radar-data/data/
          rsync -a --delete .publish/snapshots/ /tmp/radar-data/snapshots/

          cd /tmp/radar-data
          git config user.name "radar-bot"
          git config user.email "bot@radar.ai"

          git add data snapshots
          git commit -m "Auto radar data update" || echo "No changes"
          git push origin HEAD:radar-data

          cd -
          git worktree remove /tmp/radar-data --force || true
          rm -rf /tmp/radar-data || true

      # =========================
      # NOTIFY
      # =========================
      - name: Run notify
        run: node watcher/notify.js
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}